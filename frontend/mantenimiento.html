<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZARIKOF — En Mantenimiento</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --cream: #faf8f5;
            --charcoal: #1a1a1a;
            --blush: #e8c4b8;
            --taupe: #b5a09a;
            --gold: #c8a882;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Jost', sans-serif;
            background-color: var(--cream);
            color: var(--charcoal);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            overflow: hidden;
        }

        /* ── Background subtle gradient animation ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232, 196, 184, 0.25) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 80% 100%, rgba(200, 168, 130, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 520px;
            width: 100%;
            animation: fadeUp 0.9s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Logo / Brand ── */
        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.4rem, 8vw, 4rem);
            font-weight: 300;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--charcoal);
            margin-bottom: 0.2rem;
        }

        .brand-tagline {
            font-size: 0.72rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--taupe);
            margin-bottom: 3rem;
        }

        /* ── Divider ── */
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 0 auto 2.8rem;
        }

        /* ── Icon ── */
        .icon-wrap {
            width: 72px;
            height: 72px;
            border: 1px solid var(--blush);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(232, 196, 184, 0.4);
            }

            50% {
                box-shadow: 0 0 0 10px rgba(232, 196, 184, 0);
            }
        }

        .icon-wrap svg {
            width: 32px;
            height: 32px;
            stroke: var(--gold);
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ── Heading ── */
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.7rem, 5vw, 2.4rem);
            font-weight: 300;
            font-style: italic;
            color: var(--charcoal);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        /* ── Body text ── */
        .message {
            font-size: 0.9rem;
            font-weight: 300;
            line-height: 1.8;
            color: var(--taupe);
            margin-bottom: 2.5rem;
        }

        /* ── Progress bar ── */
        .progress-wrap {
            background: rgba(181, 160, 154, 0.15);
            border-radius: 999px;
            height: 3px;
            width: 100%;
            margin-bottom: 2.5rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(to right, var(--blush), var(--gold));
            animation: progress 4s ease-in-out infinite alternate;
        }

        @keyframes progress {
            from {
                width: 20%;
            }

            to {
                width: 85%;
            }
        }

        /* ── Contact link ── */
        .contact {
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--taupe);
        }

        .contact a {
            color: var(--charcoal);
            text-decoration: none;
            border-bottom: 1px solid var(--blush);
            padding-bottom: 1px;
            transition: color 0.2s, border-color 0.2s;
        }

        .contact a:hover {
            color: var(--gold);
            border-color: var(--gold);
        }

        /* ── Footer ── */
        footer {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(181, 160, 154, 0.6);
            white-space: nowrap;
            z-index: 1;
        }
    </style>
</head>

<body>

    <div class="container">
        <p class="brand">ZARIKOF</p>
        <p class="brand-tagline">Indumentaria juvenil femenina y masculina</p>

        <div class="divider"></div>

        <div class="icon-wrap" aria-hidden="true">
            <!-- Wrench / settings icon -->
            <svg viewBox="0 0 24 24">
                <path
                    d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
            </svg>
        </div>

        <h1>Estamos mejorando<br />el sitio para vos</h1>

        <p class="message">
            Nuestra tienda se encuentra temporalmente en mantenimiento.<br />
            Volveremos pronto con novedades.
        </p>

        <div class="progress-wrap" role="progressbar" aria-label="Progreso de mantenimiento">
            <div class="progress-bar"></div>
        </div>

        <p class="contact">
            Consultas&nbsp;
            <a href="https://wa.me/5491130405544" target="_blank" rel="noopener noreferrer">por WhatsApp</a>
            &nbsp;o&nbsp;
            <a href="https://www.instagram.com/zarikof_" target="_blank" rel="noopener noreferrer">Instagram</a>
            &nbsp;o&nbsp;
            <a href="https://www.tiktok.com/@zarikof_" target="_blank" rel="noopener noreferrer">TikTok</a>
        </p>
    </div>

    <footer>&copy; 2025 ZARIKOF &mdash; Todos los derechos reservados</footer>

</body>

</html>
